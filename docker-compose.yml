services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [back-tier]

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    networks: [back-tier]

  worker:
    build: ./backend
    command: python -m app.jobs.worker
    env_file: .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    networks: [back-tier]

  scheduler:
    build: ./backend
    command: python -m app.jobs.scheduler
    env_file: .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    networks: [back-tier]

volumes:
  db_data:

networks:
  back-tier:
