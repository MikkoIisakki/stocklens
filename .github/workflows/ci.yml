name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stocks_test
          POSTGRES_USER: stocks
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks-action scans the push range (parent..head); needs full
          # history to resolve the parent commit on multi-commit pushes.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Format check
        run: uv run ruff format backend/ --check

      - name: Lint
        run: uv run ruff check backend/

      - name: Type check
        run: uv run mypy backend/app

      - name: Security scan
        run: uv run bandit -r backend/app -ll --exit-zero

      - name: Complexity check
        run: uv run radon cc backend/app -n C --show-complexity

      - name: Dependency vulnerability audit
        # GHSA-58qw-9mgm-455v: pip 26.0.1, no fix version published yet (2026-04-27).
        # Re-evaluate when a patched pip ships.
        run: uv run pip-audit --ignore-vuln GHSA-58qw-9mgm-455v

      - name: License audit
        run: uv run pip-licenses --order=license --fail-on="GNU General Public License v2 (GPLv2);GNU General Public License v3 (GPLv3);GNU Affero General Public License v3 (AGPLv3);Server Side Public License"

      - name: Tests + coverage
        run: uv run pytest tests/ -q
        env:
          DATABASE_URL: postgresql://stocks:test@localhost:5432/stocks_test

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
