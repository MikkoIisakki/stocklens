name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "config/domains/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
      - "config/domains/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        env:
          PULSE_DOMAIN: energy
          # app.config.ts only needs PULSE_DOMAIN to load the YAML; the
          # API URL/key are read at runtime, not build time.
        run: npm run typecheck
