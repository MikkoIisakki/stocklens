repos:
  # Secret scanning — runs first, blocks commit if secret detected
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Formatting + linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking — only typed packages as additional_dependencies
  # Untyped packages (yfinance, apscheduler, pandas-ta, etc.) are handled via
  # [[tool.mypy.overrides]] ignore_missing_imports in pyproject.toml
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        files: ^backend/app/
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - asyncpg-stubs
          - fastapi
          - httpx
